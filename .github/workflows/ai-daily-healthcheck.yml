name: AI Daily Healthcheck

on:
  schedule:
    - cron: "0 9 * * 1"   # mandag 09:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/ai-daily/requirements.txt

      - name: Install dependencies
        working-directory: scripts/ai-daily
        run: pip install -r requirements.txt

      - name: Run healthcheck
        working-directory: scripts/ai-daily
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python healthcheck.py
