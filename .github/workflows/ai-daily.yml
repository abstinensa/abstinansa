name: AI Daily Newsletter

on:
  schedule:
    - cron: "30 5 * * *"   # 06:30 CET vinter / 07:30 CEST sommer
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no email, no commit)"
        type: boolean
        default: false

concurrency:
  group: ai-daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/ai-daily/requirements.txt

      - name: Install dependencies
        working-directory: scripts/ai-daily
        run: pip install -r requirements.txt

      - name: Run newsletter
        working-directory: scripts/ai-daily
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TZ: "Europe/Oslo"
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Commit edition
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "ai-daily-bot"
          git config user.email "ai-daily@abstinensa.no"
          git add ai-daily/
          if git diff --staged --quiet; then
            echo "Ingen endringer å committe."
          else
            git commit -m "AI Daily $(date -u +%Y-%m-%d)"
            git push
          fi
