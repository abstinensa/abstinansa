<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oslo Nå</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #e8d5a3;
    --accent2: #7fb3c8;
    --text: #f0ebe0;
    --muted: #888;
    --red: #c4694a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Fraunces', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  header {
    padding: 3rem 2rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 2rem;
  }

  .logo-area h1 {
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 700;
    line-height: 0.9;
    letter-spacing: -0.03em;
    color: var(--accent);
  }

  .logo-area .sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  .date-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-align: right;
    letter-spacing: 0.1em;
  }

  .controls {
    padding: 1.5rem 2rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.4rem 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232, 213, 163, 0.05);
  }

  .date-input {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.4rem 0.75rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    border-radius: 2px;
    cursor: pointer;
    color-scheme: dark;
  }

  .date-input:focus { outline: none; border-color: var(--accent); }

  .search-btn {
    margin-left: auto;
    background: var(--accent);
    border: none;
    color: var(--bg);
    padding: 0.5rem 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .search-btn:hover { background: #f5e9c0; }
  .search-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  .main {
    padding: 2rem;
    max-width: 1000px;
  }

  .loading {
    display: none;
    padding: 4rem 0;
    text-align: center;
  }

  .loading.visible { display: block; }

  .loading-inner {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .pulse-ring {
    width: 60px;
    height: 60px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.2); opacity: 1; }
  }

  .loading p {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .empty-state {
    padding: 5rem 0;
    text-align: center;
  }

  .empty-state .big-text {
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    font-weight: 300;
    font-style: italic;
    color: var(--muted);
    line-height: 1.4;
  }

  .empty-state .hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--border);
    margin-top: 1rem;
    letter-spacing: 0.1em;
  }

  .events-grid {
    display: grid;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .event-card {
    background: var(--surface);
    padding: 1.75rem;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 1.5rem;
    align-items: start;
    transition: background 0.15s;
    cursor: default;
  }

  .event-card:hover { background: #1c1c1c; }

  .event-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--border);
    padding-top: 0.25rem;
    letter-spacing: 0.05em;
  }

  .event-body {}

  .event-category {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 0.4rem;
  }

  .event-title {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  .event-desc {
    font-size: 0.9rem;
    font-weight: 300;
    font-style: italic;
    color: #aaa;
    line-height: 1.5;
    max-width: 60ch;
  }

  .event-meta {
    text-align: right;
    min-width: 130px;
  }

  .event-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin-bottom: 0.3rem;
  }

  .event-location {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .error-bar {
    display: none;
    background: rgba(196, 105, 74, 0.1);
    border: 1px solid var(--red);
    color: var(--red);
    padding: 1rem 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    margin-bottom: 1.5rem;
  }

  .error-bar.visible { display: block; }

  .result-header {
    display: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .result-header.visible { display: block; }

  @media (max-width: 600px) {
    .event-card { grid-template-columns: 1fr; }
    .event-num { display: none; }
    .event-meta { text-align: left; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <h1>Oslo<br>Nå</h1>
    <div class="sub">Hva skjer i Oslo</div>
  </div>
  <div class="date-badge" id="dateBadge"></div>
</header>

<div class="controls">
  <button class="filter-btn active" data-filter="alt">Alt</button>
  <button class="filter-btn" data-filter="kultur">Kultur</button>
  <button class="filter-btn" data-filter="mat">Mat & Drikke</button>
  <button class="filter-btn" data-filter="musikk">Musikk</button>
  <button class="filter-btn" data-filter="sport">Sport</button>
  <button class="filter-btn" data-filter="uteliv">Uteliv</button>
  <input type="date" class="date-input" id="datePicker">
  <button class="search-btn" id="searchBtn" onclick="fetchEvents()">Søk nå →</button>
</div>

<div class="main">
  <div class="error-bar" id="errorBar"></div>
  <div class="result-header" id="resultHeader"></div>

  <div class="loading" id="loading">
    <div class="loading-inner">
      <div class="pulse-ring"></div>
      <p>Søker etter arrangementer...</p>
    </div>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="big-text">Trykk «Søk nå» for å se<br>hva som skjer i Oslo</div>
    <div class="hint">// Demo med kuratert eksempeldata</div>
  </div>

  <div class="events-grid" id="eventsGrid" style="display:none;"></div>
</div>

<script>
  // Set date + date picker default
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  document.getElementById('datePicker').value = todayStr;
  document.getElementById('dateBadge').innerHTML =
    now.toLocaleDateString('no-NO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase() +
    '<br>' + now.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });

  document.getElementById('datePicker').addEventListener('change', () => {
    const d = new Date(document.getElementById('datePicker').value);
    document.getElementById('dateBadge').innerHTML =
      d.toLocaleDateString('no-NO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
  });

  // Filter buttons
  let activeFilter = 'alt';
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
    });
  });

  // Curated demo data. Static site has no backend, so events are local.
  const DEMO_EVENTS = [
    { title: 'Munch + Hodler', category: 'kultur', cat: 'Kunst', description: 'To av nordens største symbolister i dialog. Stor utstilling med arbeider lånt fra Sveits.', location: 'Munchmuseet, Bjørvika', price: 'Fra 180 kr', timeOfDay: '11:00–21:00' },
    { title: 'Nasjonalmuseet — Faste samlinger', category: 'kultur', cat: 'Kunst', description: 'Fra Skrik til moderne design. Avsett minst tre timer.', location: 'Nasjonalmuseet, Brynjulf Bulls plass', price: '200 kr', timeOfDay: '10:00–20:00' },
    { title: 'Den Norske Opera: La Bohème', category: 'kultur', cat: 'Opera', description: 'Puccinis klassiker i ny oppsetning. Norsk tekstlinje over scenen.', location: 'Operaen, Bjørvika', price: 'Fra 295 kr', timeOfDay: '19:00' },
    { title: 'Litteraturhuset: Forfattermøte', category: 'kultur', cat: 'Litteratur', description: 'Samtale om årets mest omtalte debutroman, etterfulgt av Q&A.', location: 'Litteraturhuset, Wergelandsveien 29', price: 'Gratis', timeOfDay: '18:30' },

    { title: 'Vippa — Streetfood-marked', category: 'mat', cat: 'Mat', description: 'Tolv små kjøkken under ett tak. Fra ramen til tacos al pastor — alltid køverdig.', location: 'Vippetangen', price: '120–250 kr', timeOfDay: '11:00–22:00' },
    { title: 'Mathallen Vinsmaking', category: 'mat', cat: 'Drikke', description: 'Naturvin fra Loire med smaksnotater fra sommelier. Inkluderer småretter.', location: 'Mathallen, Vulkan', price: '395 kr', timeOfDay: '19:00–21:30' },
    { title: 'Bondens Marked', category: 'mat', cat: 'Mat', description: 'Lokale produsenter med ost, brød, kjøtt og rotgrønt — direkte fra gården.', location: 'Birkelunden, Grünerløkka', price: 'Inngang gratis', timeOfDay: '10:00–15:00' },

    { title: 'Sentralen: DJ Fredag Sent', category: 'musikk', cat: 'Klubb', description: 'Lokale DJer spinner house og disco til langt på natt. 20-årsgrense.', location: 'Sentralen, Øvre Slottsgate 3', price: '150 kr', timeOfDay: '23:00–03:00' },
    { title: 'Oslo Konserthus: Symfonisk', category: 'musikk', cat: 'Klassisk', description: 'Oslo-Filharmonien spiller Sibelius og Grieg. Dirigent: Klaus Mäkelä.', location: 'Oslo Konserthus, Munkedamsveien', price: 'Fra 350 kr', timeOfDay: '19:30' },
    { title: 'Blå: Live Jazz', category: 'musikk', cat: 'Jazz', description: 'Ung norsk kvintett med inspirasjon fra ECM-skolen. To sett.', location: 'Blå, Brenneriveien 9C', price: '220 kr', timeOfDay: '21:00' },
    { title: 'Rockefeller: Indie-kveld', category: 'musikk', cat: 'Konsert', description: 'Hovedband fra Manchester med to oppvarmingsband fra Oslo.', location: 'Rockefeller, Torggata', price: '485 kr', timeOfDay: '20:00' },

    { title: 'Vålerenga – Bodø/Glimt', category: 'sport', cat: 'Fotball', description: 'Eliteseriekamp på Intility Arena. Stemning garantert.', location: 'Intility Arena, Valle', price: 'Fra 290 kr', timeOfDay: '18:00' },
    { title: 'Ekebergsletta Parkrun', category: 'sport', cat: 'Løping', description: 'Gratis 5 km hver lørdag — alle nivåer, fra rolig jogg til konkurranse.', location: 'Ekebergsletta', price: 'Gratis', timeOfDay: '09:30' },
    { title: 'Frognerbadet — Åpen svømming', category: 'sport', cat: 'Bad', description: 'Klassisk friluftsbad fra 1956. 50-meters basseng og stupetårn.', location: 'Frognerbadet, Middelthuns gate', price: '140 kr', timeOfDay: '07:00–19:00' },

    { title: 'Crowbar — Craft beer', category: 'uteliv', cat: 'Bar', description: 'Bryggeripub i Torggata med 60 kraner. God innendørsstemning og pizza fra naboen.', location: 'Crowbar, Torggata 32', price: 'Pils 99 kr', timeOfDay: '15:00–01:00' },
    { title: 'Himkok — Cocktailbar', category: 'uteliv', cat: 'Cocktail', description: 'Topp-50 i verden. Spesialiteter på akevitt og lokale råvarer.', location: 'Himkok, Storgata 27', price: 'Drinker fra 175 kr', timeOfDay: '18:00–02:00' },
    { title: 'Tøyen Torg — Kveldsmarked', category: 'uteliv', cat: 'Marked', description: 'Bod, foodtruck og DJ utendørs så lenge været holder.', location: 'Tøyen Torg', price: 'Gratis inngang', timeOfDay: '17:00–23:00' },
  ];

  function pickEvents(filter, picked) {
    const day = picked.getDay(); // rotates lineup so different dates feel different
    const pool = filter === 'alt' ? DEMO_EVENTS.slice() : DEMO_EVENTS.filter(e => e.category === filter);
    if (pool.length === 0) return [];
    const rotated = pool.slice(day % pool.length).concat(pool.slice(0, day % pool.length));
    return rotated.slice(0, Math.min(8, rotated.length));
  }

  function formatEventDate(picked, timeOfDay) {
    const dayName = picked.toLocaleDateString('no-NO', { weekday: 'short' });
    const dayNum = picked.getDate();
    const monthName = picked.toLocaleDateString('no-NO', { month: 'long' });
    const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
    return `${cap(dayName)} ${dayNum}. ${monthName}, ${timeOfDay}`;
  }

  async function fetchEvents() {
    const btn = document.getElementById('searchBtn');
    const loading = document.getElementById('loading');
    const emptyState = document.getElementById('emptyState');
    const grid = document.getElementById('eventsGrid');
    const errorBar = document.getElementById('errorBar');
    const resultHeader = document.getElementById('resultHeader');

    btn.disabled = true;
    btn.textContent = 'Søker...';
    loading.classList.add('visible');
    emptyState.style.display = 'none';
    grid.style.display = 'none';
    errorBar.classList.remove('visible');
    resultHeader.classList.remove('visible');

    const pickedDate = new Date(document.getElementById('datePicker').value + 'T12:00:00');

    await new Promise(r => setTimeout(r, 600));

    const events = pickEvents(activeFilter, pickedDate);

    loading.classList.remove('visible');

    if (events.length === 0) {
      emptyState.style.display = 'block';
      errorBar.textContent = 'Ingen arrangementer i denne kategorien — prøv en annen.';
      errorBar.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Søk igjen →';
      return;
    }

    grid.innerHTML = '';
    grid.style.display = 'grid';

    resultHeader.textContent = `// ${events.length} arrangementer · Demo-data · Oppdatert ${new Date().toLocaleTimeString('no-NO')}`;
    resultHeader.classList.add('visible');

    events.forEach((ev, i) => {
      const card = document.createElement('div');
      card.className = 'event-card';
      card.innerHTML = `
        <div class="event-num">${String(i + 1).padStart(2, '0')}</div>
        <div class="event-body">
          <div class="event-category">${escHtml(ev.cat)}</div>
          <div class="event-title">${escHtml(ev.title)}</div>
          <div class="event-desc">${escHtml(ev.description)}</div>
        </div>
        <div class="event-meta">
          <div class="event-date">${escHtml(formatEventDate(pickedDate, ev.timeOfDay))}</div>
          <div class="event-location">${escHtml(ev.location)}</div>
          <div class="event-location" style="margin-top:0.3rem;color:#7fb3c8">${escHtml(ev.price)}</div>
        </div>
      `;
      grid.appendChild(card);
    });

    btn.disabled = false;
    btn.textContent = 'Søk igjen →';
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
