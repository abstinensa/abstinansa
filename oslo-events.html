<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oslo Nå</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #e8d5a3;
    --accent2: #7fb3c8;
    --text: #f0ebe0;
    --muted: #888;
    --red: #c4694a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Fraunces', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  header {
    padding: 3rem 2rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 2rem;
  }

  .logo-area h1 {
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 700;
    line-height: 0.9;
    letter-spacing: -0.03em;
    color: var(--accent);
  }

  .logo-area .sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  .date-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-align: right;
    letter-spacing: 0.1em;
  }

  .controls {
    padding: 1.5rem 2rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.4rem 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232, 213, 163, 0.05);
  }

  .date-input {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.4rem 0.75rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    border-radius: 2px;
    cursor: pointer;
    color-scheme: dark;
  }

  .date-input:focus { outline: none; border-color: var(--accent); }

  .search-btn {
    margin-left: auto;
    background: var(--accent);
    border: none;
    color: var(--bg);
    padding: 0.5rem 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .search-btn:hover { background: #f5e9c0; }
  .search-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  .main {
    padding: 2rem;
    max-width: 1000px;
  }

  .loading {
    display: none;
    padding: 4rem 0;
    text-align: center;
  }

  .loading.visible { display: block; }

  .loading-inner {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .pulse-ring {
    width: 60px;
    height: 60px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.2); opacity: 1; }
  }

  .loading p {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .empty-state {
    padding: 5rem 0;
    text-align: center;
  }

  .empty-state .big-text {
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    font-weight: 300;
    font-style: italic;
    color: var(--muted);
    line-height: 1.4;
  }

  .empty-state .hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--border);
    margin-top: 1rem;
    letter-spacing: 0.1em;
  }

  .events-grid {
    display: grid;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .event-card {
    background: var(--surface);
    padding: 1.75rem;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 1.5rem;
    align-items: start;
    transition: background 0.15s;
    cursor: default;
  }

  .event-card:hover { background: #1c1c1c; }

  .event-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--border);
    padding-top: 0.25rem;
    letter-spacing: 0.05em;
  }

  .event-body {}

  .event-category {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 0.4rem;
  }

  .event-title {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  .event-desc {
    font-size: 0.9rem;
    font-weight: 300;
    font-style: italic;
    color: #aaa;
    line-height: 1.5;
    max-width: 60ch;
  }

  .event-meta {
    text-align: right;
    min-width: 130px;
  }

  .event-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin-bottom: 0.3rem;
  }

  .event-location {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .error-bar {
    display: none;
    background: rgba(196, 105, 74, 0.1);
    border: 1px solid var(--red);
    color: var(--red);
    padding: 1rem 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    margin-bottom: 1.5rem;
  }

  .error-bar.visible { display: block; }

  .result-header {
    display: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .result-header.visible { display: block; }

  @media (max-width: 600px) {
    .event-card { grid-template-columns: 1fr; }
    .event-num { display: none; }
    .event-meta { text-align: left; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <h1>Oslo<br>Nå</h1>
    <div class="sub">Hva skjer i Oslo</div>
  </div>
  <div class="date-badge" id="dateBadge"></div>
</header>

<div class="controls">
  <button class="filter-btn active" data-filter="alt">Alt</button>
  <button class="filter-btn" data-filter="kultur">Kultur</button>
  <button class="filter-btn" data-filter="mat">Mat & Drikke</button>
  <button class="filter-btn" data-filter="musikk">Musikk</button>
  <button class="filter-btn" data-filter="sport">Sport</button>
  <button class="filter-btn" data-filter="uteliv">Uteliv</button>
  <input type="date" class="date-input" id="datePicker">
  <button class="search-btn" id="searchBtn" onclick="fetchEvents()">Søk nå →</button>
</div>

<div class="main">
  <div class="error-bar" id="errorBar"></div>
  <div class="result-header" id="resultHeader"></div>

  <div class="loading" id="loading">
    <div class="loading-inner">
      <div class="pulse-ring"></div>
      <p>Søker etter arrangementer...</p>
    </div>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="big-text">Trykk «Søk nå» for å se<br>hva som skjer i Oslo</div>
    <div class="hint">// Bruker AI + nettsøk for ferske resultater</div>
  </div>

  <div class="events-grid" id="eventsGrid" style="display:none;"></div>
</div>

<script>
  // Set date + date picker default
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  document.getElementById('datePicker').value = todayStr;
  document.getElementById('dateBadge').innerHTML =
    now.toLocaleDateString('no-NO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase() +
    '<br>' + now.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });

  document.getElementById('datePicker').addEventListener('change', () => {
    const d = new Date(document.getElementById('datePicker').value);
    document.getElementById('dateBadge').innerHTML =
      d.toLocaleDateString('no-NO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
  });

  // Filter buttons
  let activeFilter = 'alt';
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
    });
  });

  async function fetchEvents() {
    const btn = document.getElementById('searchBtn');
    const loading = document.getElementById('loading');
    const emptyState = document.getElementById('emptyState');
    const grid = document.getElementById('eventsGrid');
    const errorBar = document.getElementById('errorBar');
    const resultHeader = document.getElementById('resultHeader');

    btn.disabled = true;
    btn.textContent = 'Søker...';
    loading.classList.add('visible');
    emptyState.style.display = 'none';
    grid.style.display = 'none';
    errorBar.classList.remove('visible');
    resultHeader.classList.remove('visible');

    const filterText = activeFilter === 'alt' ? 'alle typer arrangementer' : activeFilter;
    const pickedDate = new Date(document.getElementById('datePicker').value + 'T12:00:00');
    const dateStr = pickedDate.toLocaleDateString('no-NO', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    const prompt = `Søk på nettet etter hva som skjer i Oslo nå i ${dateStr}. Finn ${filterText} i Oslo denne uken.

    Returner KUN gyldig JSON med denne strukturen (ingen markdown, ingen forklaring):
    {
      "events": [
        {
          "title": "Navn på arrangementet",
          "category": "Kategori (f.eks. Musikk, Kunst, Mat, Sport, Festival)",
          "description": "Kort beskrivelse på 1-2 setninger",
          "date": "Dato og tid (f.eks. Lør 8. mars, 19:00)",
          "location": "Sted i Oslo",
          "price": "Pris eller Gratis"
        }
      ],
      "updated": "Tidspunkt for søket"
    }

    Finn 6-10 reelle arrangementer. Vær spesifikk med navn og steder.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 2000,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();

      // Extract text from response
      const textBlocks = data.content.filter(b => b.type === 'text');
      const fullText = textBlocks.map(b => b.text).join('\n');

      // Extract events array directly - more robust than full JSON parse
      let parsed = { events: [] };

      // Try 1: standard JSON parse after cleanup
      try {
        let jsonStr = fullText.replace(/```json|```/g, '').trim();
        const s = jsonStr.indexOf('{'), e = jsonStr.lastIndexOf('}');
        if (s !== -1 && e !== -1) {
          jsonStr = jsonStr.slice(s, e + 1).replace(/,\s*([}\]])/g, '$1');
          parsed = JSON.parse(jsonStr);
        }
      } catch(_) {
        // Try 2: extract each event object individually via regex
        const eventMatches = fullText.matchAll(/\{[^{}]*"title"[^{}]*\}/g);
        const events = [];
        for (const m of eventMatches) {
          try {
            const cleaned = m[0].replace(/,\s*([}\]])/g, '$1');
            events.push(JSON.parse(cleaned));
          } catch(_) {}
        }
        if (events.length > 0) {
          parsed = { events };
        } else {
          // Try 3: manual field extraction as last resort
          const titles = [...fullText.matchAll(/"title"\s*:\s*"([^"]+)"/g)].map(m => m[1]);
          const cats   = [...fullText.matchAll(/"category"\s*:\s*"([^"]+)"/g)].map(m => m[1]);
          const descs  = [...fullText.matchAll(/"description"\s*:\s*"([^"]+)"/g)].map(m => m[1]);
          const dates  = [...fullText.matchAll(/"date"\s*:\s*"([^"]+)"/g)].map(m => m[1]);
          const locs   = [...fullText.matchAll(/"location"\s*:\s*"([^"]+)"/g)].map(m => m[1]);
          const prices = [...fullText.matchAll(/"price"\s*:\s*"([^"]+)"/g)].map(m => m[1]);
          if (titles.length > 0) {
            parsed.events = titles.map((t, i) => ({
              title: t,
              category: cats[i] || '',
              description: descs[i] || '',
              date: dates[i] || '',
              location: locs[i] || '',
              price: prices[i] || ''
            }));
          } else {
            throw new Error('Kunne ikke tolke svar fra AI');
          }
        }
      }
      const events = parsed.events || [];

      if (events.length === 0) throw new Error('Ingen arrangementer funnet');

      loading.classList.remove('visible');
      grid.innerHTML = '';
      grid.style.display = 'grid';

      resultHeader.textContent = `// ${events.length} arrangementer funnet · Oppdatert ${new Date().toLocaleTimeString('no-NO')}`;
      resultHeader.classList.add('visible');

      events.forEach((ev, i) => {
        const card = document.createElement('div');
        card.className = 'event-card';
        card.innerHTML = `
          <div class="event-num">0${i + 1}</div>
          <div class="event-body">
            <div class="event-category">${escHtml(ev.category || '')}</div>
            <div class="event-title">${escHtml(ev.title || '')}</div>
            <div class="event-desc">${escHtml(ev.description || '')}</div>
          </div>
          <div class="event-meta">
            <div class="event-date">${escHtml(ev.date || '')}</div>
            <div class="event-location">${escHtml(ev.location || '')}</div>
            <div class="event-location" style="margin-top:0.3rem;color:#7fb3c8">${escHtml(ev.price || '')}</div>
            ${ev.source ? `<div class="event-location" style="margin-top:0.3rem;color:#555;font-size:0.55rem">${escHtml(ev.source)}</div>` : ''}
          </div>
        `;
        grid.appendChild(card);
      });

    } catch (err) {
      loading.classList.remove('visible');
      emptyState.style.display = 'block';
      errorBar.textContent = `Feil: ${err.message}`;
      errorBar.classList.add('visible');
    }

    btn.disabled = false;
    btn.textContent = 'Søk igjen →';
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
